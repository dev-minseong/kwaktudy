<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>개발 노트</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --text: #e8e8e8;
  --text2: #999;
  --accent: #3A89FF;
  --accent-dim: rgba(58,137,255,0.12);
  --green: #34d399;
  --green-dim: rgba(52,211,153,0.12);
  --orange: #fb923c;
  --orange-dim: rgba(251,146,60,0.12);
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.12);
  --pink: #f472b6;
  --pink-dim: rgba(244,114,182,0.12);
  --yellow: #fbbf24;
  --yellow-dim: rgba(251,191,36,0.12);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.12);
  --radius: 14px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  font-size: 15px;
  min-height: 100dvh;
  padding-bottom: env(safe-area-inset-bottom, 20px);
}

/* Fixed top area */
.fixed-top {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

/* Header */
.header {
  padding: 12px 16px;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.header h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.header h1 span { color: var(--accent); }

.stats {
  font-size: 12px;
  color: var(--text2);
  background: var(--surface);
  padding: 4px 10px;
  border-radius: 20px;
}

/* Search */
.search-wrap {
  position: relative;
}

.search-wrap svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text2);
}

.search {
  width: 100%;
  padding: 10px 12px 10px 38px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.search:focus { border-color: var(--accent); }

.search::placeholder { color: var(--text2); }

/* Tabs */
.tabs {
  display: flex;
  gap: 6px;
  padding: 8px 16px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.tabs::-webkit-scrollbar { display: none; }

.tab {
  flex-shrink: 0;
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.tab.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.tab .count {
  display: inline-block;
  margin-left: 4px;
  font-size: 11px;
  opacity: 0.7;
}

/* Content */
.content {
  padding: 8px 16px 100px;
}

/* Category Section */
.category-section {
  margin-bottom: 24px;
}

.category-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  padding: 8px 0;
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--bg);
}

.category-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.category-header h2 {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.category-header .cat-count {
  font-size: 12px;
  color: var(--text2);
  margin-left: auto;
}

/* Card */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.2s;
}

.card.bookmarked { border-color: var(--yellow); }

.card-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}

.card-title {
  font-size: 15px;
  font-weight: 600;
  flex: 1;
  padding-right: 8px;
}

.card-tags {
  display: flex;
  gap: 4px;
  align-items: center;
}

.tag {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 4px;
  font-weight: 600;
  letter-spacing: 0.3px;
}

.card-chevron {
  color: var(--text2);
  transition: transform 0.25s;
  flex-shrink: 0;
  margin-left: 6px;
}

.card.open .card-chevron { transform: rotate(180deg); }

.card-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}

.card.open .card-body { max-height: 2000px; }

.card-content {
  padding: 0 16px 16px;
}

.def-block {
  margin-bottom: 14px;
}

.def-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.def-label.basic { color: var(--accent); }
.def-label.easy { color: var(--green); }
.def-label.example { color: var(--orange); }
.def-label.tip { color: var(--purple); }
.def-label.related { color: var(--pink); }

.def-text {
  font-size: 14px;
  color: var(--text);
  line-height: 1.7;
}

.def-text code {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 13px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  color: var(--accent);
}

.code-block {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  margin: 8px 0;
  overflow-x: auto;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 12.5px;
  line-height: 1.6;
  color: var(--text);
}

.bookmark-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  font-size: 16px;
  transition: filter 0.2s;
  filter: grayscale(1) brightness(2);
  line-height: 1;
}

.card.bookmarked .bookmark-btn { filter: none; }

/* Bottom Nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(10,10,10,0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  padding: 8px 0;
  padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
  z-index: 100;
}

.nav-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  background: none;
  border: none;
  color: var(--text2);
  font-size: 10px;
  cursor: pointer;
  padding: 4px 12px;
  transition: color 0.2s;
}

.nav-btn.active { color: var(--accent); }

.nav-btn svg { width: 22px; height: 22px; }

/* Highlight */
mark {
  background: var(--accent-dim);
  color: var(--accent);
  padding: 0 2px;
  border-radius: 2px;
}

/* Empty state */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text2);
}

.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty h3 { font-size: 16px; margin-bottom: 6px; color: var(--text); }
.empty p { font-size: 13px; }

/* Progress bar */
.progress-wrap {
  padding: 0 16px 6px;
}

.progress-bar {
  height: 3px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--purple));
  border-radius: 2px;
  transition: width 0.5s ease;
}

/* Scroll to top */
.scroll-top {
  position: fixed;
  bottom: 80px;
  right: 16px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  border: none;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 12px rgba(58,137,255,0.3);
  z-index: 99;
  transition: transform 0.2s;
}

.scroll-top.show { display: flex; }

/* Level Badge */
.level-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.level-badge {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 800;
  color: white;
  flex-shrink: 0;
}

.level-info { flex: 1; }

.level-title {
  font-size: 13px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
}

.level-title .rank { color: var(--yellow); }

.xp-bar {
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  margin-top: 4px;
  overflow: hidden;
}

.xp-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}

.xp-text {
  font-size: 10px;
  color: var(--text2);
  margin-top: 2px;
}

.streak-badge {
  text-align: center;
  padding: 4px 10px;
  background: var(--orange-dim);
  border-radius: 8px;
  flex-shrink: 0;
}

.streak-num {
  font-size: 18px;
  font-weight: 800;
  color: var(--orange);
  line-height: 1;
}

.streak-label {
  font-size: 9px;
  color: var(--orange);
  font-weight: 600;
}

/* Toast */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px 32px;
  text-align: center;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s ease;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.toast.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
  pointer-events: auto;
}

.toast-icon { font-size: 48px; margin-bottom: 8px; }
.toast-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.toast-sub { font-size: 13px; color: var(--text2); }
.toast-xp { font-size: 14px; color: var(--green); font-weight: 700; margin-top: 6px; }

/* Achievement badges */
.achievements-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 16px;
}

.achievement {
  text-align: center;
  padding: 10px 4px;
  border-radius: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  transition: all 0.2s;
}

.achievement.unlocked {
  border-color: var(--yellow);
  background: var(--yellow-dim);
}

.achievement.locked { opacity: 0.35; }

.achievement-icon { font-size: 24px; }
.achievement-name { font-size: 9px; margin-top: 4px; font-weight: 600; color: var(--text2); }
.achievement.unlocked .achievement-name { color: var(--text); }

/* Daily goal */
.daily-goal {
  margin: 0 16px 8px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.daily-dots {
  display: flex;
  gap: 4px;
}

.daily-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  transition: all 0.3s;
}

.daily-dot.filled {
  background: var(--green);
  border-color: var(--green);
  box-shadow: 0 0 6px rgba(52,211,153,0.4);
}

.daily-text {
  font-size: 12px;
  color: var(--text2);
  flex: 1;
}

.daily-text strong { color: var(--text); }

/* Card read indicator */
.card-header .read-check {
  color: var(--green);
  flex-shrink: 0;
  margin-right: 6px;
  opacity: 0;
  transition: opacity 0.3s;
}

.card.read .read-check { opacity: 1; }

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes popIn {
  0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
  70% { transform: translate(-50%, -50%) scale(1.1); }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}

.toast.show { animation: popIn 0.4s ease forwards; }

.card { animation: fadeIn 0.3s ease; }

/* Quiz */
.quiz-container {
  padding: 16px;
  max-width: 500px;
  margin: 0 auto;
}

.quiz-header {
  text-align: center;
  margin-bottom: 20px;
}

.quiz-progress {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 8px;
}

.quiz-progress-bar {
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 16px;
}

.quiz-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s;
}

.quiz-question {
  font-size: 18px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 8px;
  line-height: 1.5;
}

.quiz-hint {
  font-size: 13px;
  color: var(--text2);
  text-align: center;
  margin-bottom: 24px;
}

.quiz-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.quiz-option {
  padding: 14px 16px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 14px;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s;
  line-height: 1.5;
}

.quiz-option:active { transform: scale(0.98); }

.quiz-option.correct {
  border-color: var(--green);
  background: var(--green-dim);
  color: var(--green);
}

.quiz-option.wrong {
  border-color: var(--red);
  background: var(--red-dim);
  color: var(--red);
}

.quiz-option.disabled { pointer-events: none; }

.quiz-explain {
  margin-top: 16px;
  padding: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.7;
  color: var(--text2);
  animation: fadeIn 0.3s ease;
}

.quiz-explain strong { color: var(--text); }

.quiz-next-btn {
  width: 100%;
  margin-top: 16px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s;
}

.quiz-next-btn:active { opacity: 0.8; }

.quiz-result {
  text-align: center;
  padding: 40px 20px;
}

.quiz-result-icon { font-size: 64px; margin-bottom: 16px; }
.quiz-result-score { font-size: 48px; font-weight: 800; color: var(--accent); }
.quiz-result-label { font-size: 14px; color: var(--text2); margin-top: 4px; }

.quiz-result-detail {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin: 20px 0;
}

.quiz-result-stat {
  text-align: center;
}

.quiz-result-stat .num {
  font-size: 24px;
  font-weight: 700;
}

.quiz-result-stat .label {
  font-size: 11px;
  color: var(--text2);
}

.quiz-mode-select {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 20px 16px;
}

.quiz-mode-btn {
  padding: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  text-align: left;
  transition: border-color 0.2s;
}

.quiz-mode-btn:active { border-color: var(--accent); }

.quiz-mode-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 4px;
}

.quiz-mode-desc {
  font-size: 12px;
  color: var(--text2);
}
</style>
</head>
<body>

<div class="fixed-top">
  <div class="header">
    <div class="header-top">
      <h1><span>Dev</span> Notes</h1>
      <span class="stats" id="stats"></span>
    </div>
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="search" id="search" placeholder="개념 검색..." autocomplete="off">
    </div>
  </div>

  <div class="level-bar" id="levelBar"></div>

  <div class="tabs" id="tabs"></div>

  <div class="daily-goal" id="dailyGoal"></div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  </div>
</div>

<div class="content" id="content"></div>

<div class="toast" id="toast">
  <div class="toast-icon" id="toastIcon"></div>
  <div class="toast-title" id="toastTitle"></div>
  <div class="toast-sub" id="toastSub"></div>
  <div class="toast-xp" id="toastXp"></div>
</div>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m18 15-6-6-6 6"/></svg>
</button>

<nav class="bottom-nav">
  <button class="nav-btn active" data-view="all" onclick="setView('all')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    전체
  </button>
  <button class="nav-btn" data-view="bookmarks" onclick="setView('bookmarks')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    북마크
  </button>
  <button class="nav-btn" data-view="quiz" onclick="setView('quiz')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    퀴즈
  </button>
  <button class="nav-btn" data-view="achievements" onclick="setView('achievements')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>
    업적
  </button>
  <button class="nav-btn" data-view="random" onclick="setView('random')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg>
    랜덤
  </button>
</nav>

<script>
// ============================================================
// DATA
// ============================================================
const DATA = [

// ──────────────────────────────────────────
// 공통 개발 개념
// ──────────────────────────────────────────
{
  cat: "common", title: "클래스 (Class)",

// ============================================================
// APP STATE
// ============================================================
let currentTab = 'all';
let currentView = 'all';
let searchQuery = '';
let openCards = new Set();

// Persistent state
function loadState() {
  return {
    bookmarks: JSON.parse(localStorage.getItem('dn-bookmarks') || '[]'),
    readItems: JSON.parse(localStorage.getItem('dn-read') || '[]'),
    xp: parseInt(localStorage.getItem('dn-xp') || '0'),
    achievements: JSON.parse(localStorage.getItem('dn-achievements') || '[]'),
    streak: parseInt(localStorage.getItem('dn-streak') || '0'),
    lastDate: localStorage.getItem('dn-last-date') || '',
    todayReads: JSON.parse(localStorage.getItem('dn-today-reads') || '[]'),
    randomUses: parseInt(localStorage.getItem('dn-random-uses') || '0'),
    quizCount: parseInt(localStorage.getItem('dn-quiz-count') || '0'),
    quizPerfect: parseInt(localStorage.getItem('dn-quiz-perfect') || '0'),
    quizBest: JSON.parse(localStorage.getItem('dn-quiz-best') || '{}'),
  };
}

function saveState(state) {
  localStorage.setItem('dn-bookmarks', JSON.stringify(state.bookmarks));
  localStorage.setItem('dn-read', JSON.stringify(state.readItems));
  localStorage.setItem('dn-xp', state.xp.toString());
  localStorage.setItem('dn-achievements', JSON.stringify(state.achievements));
  localStorage.setItem('dn-streak', state.streak.toString());
  localStorage.setItem('dn-last-date', state.lastDate);
  localStorage.setItem('dn-today-reads', JSON.stringify(state.todayReads));
  localStorage.setItem('dn-random-uses', state.randomUses.toString());
  localStorage.setItem('dn-quiz-count', state.quizCount.toString());
  localStorage.setItem('dn-quiz-perfect', state.quizPerfect.toString());
  localStorage.setItem('dn-quiz-best', JSON.stringify(state.quizBest));
}

let state = loadState();

// Migrate old localStorage keys
(function migrate() {
  const oldBookmarks = localStorage.getItem('dev-notes-bookmarks');
  const oldRead = localStorage.getItem('dev-notes-read');
  if (oldBookmarks && !state.bookmarks.length) {
    state.bookmarks = JSON.parse(oldBookmarks);
  }
  if (oldRead && !state.readItems.length) {
    state.readItems = JSON.parse(oldRead);
    state.xp = state.readItems.length * 10;
  }
  if (oldBookmarks || oldRead) {
    saveState(state);
    localStorage.removeItem('dev-notes-bookmarks');
    localStorage.removeItem('dev-notes-read');
  }
})();

// Update streak on load
(function updateStreak() {
  const today = new Date().toISOString().slice(0, 10);
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (state.lastDate !== today) {
    if (state.lastDate === yesterday) {
      // streak continues, will increment when they read today
    } else if (state.lastDate && state.lastDate !== today) {
      state.streak = 0; // streak broken
    }
    state.todayReads = [];
    saveState(state);
  }
})();

// Computed
function getTodayCount() { return state.todayReads.length; }
function getLevel() {
  let lvl = LEVELS[0];
  for (const l of LEVELS) {
    if (state.xp >= l.min) lvl = l;
  }
  return lvl;
}
function getLevelIdx() { return LEVELS.indexOf(getLevel()); }
function getNextLevel() { return LEVELS[getLevelIdx() + 1] || null; }

// ============================================================
// TOAST
// ============================================================
let toastTimeout;
function showToast(icon, title, sub, xp) {
  const t = document.getElementById('toast');
  document.getElementById('toastIcon').textContent = icon;
  document.getElementById('toastTitle').textContent = title;
  document.getElementById('toastSub').textContent = sub;
  document.getElementById('toastXp').textContent = xp ? `+${xp} XP` : '';
  t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), 2000);
}

// ============================================================
// XP & ACHIEVEMENTS
// ============================================================
function addXP(amount, reason) {
  const oldLevel = getLevelIdx();
  state.xp += amount;
  saveState(state);
  const newLevel = getLevelIdx();
  if (newLevel > oldLevel) {
    const lvl = getLevel();
    setTimeout(() => showToast('🎉', `레벨 업!`, `${lvl.name} 달성`, amount), 300);
  }
}

function checkAchievements() {
  const ctx = {
    readItems: state.readItems,
    bookmarks: state.bookmarks,
    streak: state.streak,
    todayCount: getTodayCount(),
    randomUses: state.randomUses,
    quizCount: state.quizCount,
    quizPerfect: state.quizPerfect,
  };
  for (const a of ACHIEVEMENTS) {
    if (!state.achievements.includes(a.id) && a.check(ctx)) {
      state.achievements.push(a.id);
      addXP(30, a.name);
      setTimeout(() => showToast(a.icon, '업적 달성!', a.name, 30), 500);
    }
  }
  saveState(state);
}

// ============================================================
// RENDERING
// ============================================================
function getFilteredData() {
  let items = DATA.map((d, i) => ({ ...d, _i: i }));

  if (currentView === 'bookmarks') {
    items = items.filter(d => state.bookmarks.includes(d._i));
  } else if (currentView === 'random') {
    const shuffled = [...items].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, 5);
  } else if (currentView === 'achievements') {
    return []; // handled separately
  }

  if (currentTab !== 'all') {
    items = items.filter(d => d.cat === currentTab);
  }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    items = items.filter(d =>
      d.title.toLowerCase().includes(q) ||
      d.basic.toLowerCase().includes(q) ||
      d.easy.toLowerCase().includes(q) ||
      (d.tags && d.tags.some(t => t.toLowerCase().includes(q)))
    );
  }

  return items;
}

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function renderLevelBar() {
  const lvl = getLevel();
  const next = getNextLevel();
  const xpInLevel = state.xp - lvl.min;
  const xpNeeded = next ? (next.min - lvl.min) : 1;
  const pct = next ? Math.min((xpInLevel / xpNeeded) * 100, 100) : 100;
  const lvlNum = getLevelIdx() + 1;

  document.getElementById('levelBar').innerHTML = `
    <div class="level-badge" style="background:${lvl.color}">Lv${lvlNum}</div>
    <div class="level-info">
      <div class="level-title">
        <span class="rank">${lvl.name}</span>
        <span style="color:var(--text2);font-size:11px">${state.xp} XP</span>
      </div>
      <div class="xp-bar">
        <div class="xp-fill" style="width:${pct}%;background:${lvl.color}"></div>
      </div>
      <div class="xp-text">${next ? `다음 레벨까지 ${next.min - state.xp} XP` : '최고 레벨 달성!'}</div>
    </div>
    <div class="streak-badge">
      <div class="streak-num">${state.streak}</div>
      <div class="streak-label">연속</div>
    </div>
  `;
}

function renderDailyGoal() {
  const count = getTodayCount();
  const dots = Array.from({ length: DAILY_GOAL }, (_, i) =>
    `<div class="daily-dot ${i < count ? 'filled' : ''}"></div>`
  ).join('');
  document.getElementById('dailyGoal').innerHTML = `
    <div class="daily-dots">${dots}</div>
    <div class="daily-text">오늘 <strong>${count}/${DAILY_GOAL}</strong> 완료${count >= DAILY_GOAL ? ' 🎉' : ''}</div>
  `;
}

function renderTabs() {
  if (currentView === 'achievements') {
    document.getElementById('tabs').innerHTML = '';
    return;
  }
  const tabsEl = document.getElementById('tabs');
  const counts = { all: DATA.length };
  Object.keys(CATS).forEach(k => counts[k] = DATA.filter(d => d.cat === k).length);

  let html = `<button class="tab ${currentTab === 'all' ? 'active' : ''}" onclick="setTab('all')">전체 <span class="count">${counts.all}</span></button>`;
  Object.entries(CATS).forEach(([key, cat]) => {
    html += `<button class="tab ${currentTab === key ? 'active' : ''}" onclick="setTab('${key}')" style="${currentTab === key ? '' : `border-color:${cat.color}30; color:${cat.color}`}">${cat.icon} ${cat.name} <span class="count">${counts[key]}</span></button>`;
  });
  tabsEl.innerHTML = html;
}

function renderAchievements() {
  const contentEl = document.getElementById('content');
  const unlocked = state.achievements.length;
  const total = ACHIEVEMENTS.length;

  let html = `<div style="text-align:center;padding:20px 0 10px">
    <div style="font-size:48px;margin-bottom:8px">🏆</div>
    <div style="font-size:20px;font-weight:700">${unlocked}/${total} 업적</div>
    <div style="font-size:13px;color:var(--text2);margin-top:4px">업적 달성으로 +30 XP를 받으세요</div>
  </div>`;

  html += `<div class="achievements-grid">`;
  ACHIEVEMENTS.forEach(a => {
    const u = state.achievements.includes(a.id);
    html += `<div class="achievement ${u ? 'unlocked' : 'locked'}" title="${a.desc}">
      <div class="achievement-icon">${u ? a.icon : '🔒'}</div>
      <div class="achievement-name">${a.name}</div>
    </div>`;
  });
  html += `</div>`;

  // Stats summary
  const catStats = Object.entries(CATS).map(([key, cat]) => {
    const total = DATA.filter(d => d.cat === key).length;
    const read = DATA.filter((d, i) => d.cat === key && state.readItems.includes(i)).length;
    const pct = Math.round((read / total) * 100);
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
      <span>${cat.icon} ${cat.name}</span>
      <span style="font-size:13px"><strong style="color:${cat.color}">${read}/${total}</strong> <span style="color:var(--text2)">(${pct}%)</span></span>
    </div>`;
  }).join('');

  html += `<div style="margin:16px;padding:16px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border)">
    <div style="font-weight:700;margin-bottom:8px">카테고리별 진행률</div>
    ${catStats}
  </div>`;

  contentEl.innerHTML = html;
}

function renderContent() {
  if (currentView === 'quiz') {
    renderQuizModeSelect();
    return;
  }

  if (currentView === 'achievements') {
    renderAchievements();
    return;
  }

  const contentEl = document.getElementById('content');
  const items = getFilteredData();

  if (items.length === 0) {
    const msg = currentView === 'bookmarks'
      ? { icon: '⭐', title: '북마크가 없습니다', sub: '카드의 ⭐ 버튼을 눌러 북마크하세요' }
      : { icon: '🔍', title: '검색 결과가 없습니다', sub: '다른 키워드로 검색해보세요' };
    contentEl.innerHTML = `<div class="empty"><div class="empty-icon">${msg.icon}</div><h3>${msg.title}</h3><p>${msg.sub}</p></div>`;
    return;
  }

  // Group by category
  const grouped = {};
  items.forEach(item => {
    if (!grouped[item.cat]) grouped[item.cat] = [];
    grouped[item.cat].push(item);
  });

  let html = '';
  Object.entries(grouped).forEach(([cat, catItems]) => {
    const c = CATS[cat];
    html += `<div class="category-section">`;
    if (currentTab === 'all' && currentView !== 'random') {
      html += `<div class="category-header">
        <div class="category-icon" style="background:${c.bg};color:${c.color}">${c.icon}</div>
        <h2 style="color:${c.color}">${c.name}</h2>
        <span class="cat-count">${catItems.length}개</span>
      </div>`;
    }

    catItems.forEach(item => {
      const idx = item._i;
      const isBookmarked = state.bookmarks.includes(idx);
      const isRead = state.readItems.includes(idx);
      const isOpen = openCards.has(idx);

      html += `<div class="card ${isBookmarked ? 'bookmarked' : ''} ${isRead ? 'read' : ''} ${isOpen ? 'open' : ''}" id="card-${idx}">
        <div class="card-header" onclick="toggleCard(${idx})">
          <svg class="read-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>
          <span class="card-title">${highlight(item.title, searchQuery)}</span>
          <div class="card-tags">
            ${item.tags ? item.tags.map(t => {
              const tc = CATS[item.cat];
              return `<span class="tag" style="background:${tc.bg};color:${tc.color}">${t}</span>`;
            }).join('') : ''}
            <button class="bookmark-btn" onclick="event.stopPropagation();toggleBookmark(${idx})">⭐</button>
          </div>
          <svg class="card-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
        </div>
        <div class="card-body">
          <div class="card-content">
            <div class="def-block">
              <div class="def-label basic">📘 정의</div>
              <div class="def-text">${highlight(item.basic, searchQuery)}</div>
            </div>
            <div class="def-block">
              <div class="def-label easy">💡 쉽게 풀면</div>
              <div class="def-text">${highlight(item.easy, searchQuery)}</div>
            </div>
            ${item.code ? `<div class="def-block">
              <div class="def-label example">💻 코드 예시</div>
              <div class="code-block"><pre>${item.code}</pre></div>
            </div>` : ''}
          </div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  contentEl.innerHTML = html;
  updateStats();
}

function updateStats() {
  const total = DATA.length;
  const read = state.readItems.length;
  document.getElementById('stats').textContent = `${read}/${total}`;
  document.getElementById('progress').style.width = `${(read / total) * 100}%`;
}

// ============================================================
// INTERACTIONS
// ============================================================
function toggleCard(idx) {
  if (openCards.has(idx)) {
    openCards.delete(idx);
    const card = document.getElementById(`card-${idx}`);
    if (card) card.classList.remove('open');
  } else {
    openCards.add(idx);
    const card = document.getElementById(`card-${idx}`);
    if (card) card.classList.add('open');

    // Mark as read + earn XP
    if (!state.readItems.includes(idx)) {
      state.readItems.push(idx);
      const today = new Date().toISOString().slice(0, 10);

      // Update streak
      if (state.lastDate !== today) {
        const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
        state.streak = (state.lastDate === yesterday) ? state.streak + 1 : 1;
        state.lastDate = today;
      }

      state.todayReads.push(idx);
      saveState(state);

      addXP(10, DATA[idx].title);

      // Update card appearance without full re-render
      if (card) {
        card.classList.add('read');
      }

      renderLevelBar();
      renderDailyGoal();
      updateStats();
      checkAchievements();

      // Daily goal completed toast
      if (getTodayCount() === DAILY_GOAL) {
        setTimeout(() => showToast('🎯', '일일 목표 달성!', `오늘 ${DAILY_GOAL}개 읽기 완료`, 20), 800);
        addXP(20, '일일 목표');
      }
    }
  }
}

function toggleBookmark(idx) {
  const i = state.bookmarks.indexOf(idx);
  if (i === -1) {
    state.bookmarks.push(idx);
  } else {
    state.bookmarks.splice(i, 1);
  }
  saveState(state);

  // Update card appearance without full re-render
  const card = document.getElementById(`card-${idx}`);
  if (card) {
    card.classList.toggle('bookmarked', state.bookmarks.includes(idx));
    const btn = card.querySelector('.bookmark-btn');
    // 아이콘은 항상 ⭐, CSS filter로 색상 전환
  }

  // If in bookmarks view and removed, need full re-render
  if (currentView === 'bookmarks' && i !== -1) {
    renderContent();
  }

  checkAchievements();
}

function setTab(tab) {
  currentTab = tab;
  renderTabs();
  renderContent();
}

function setView(view) {
  currentView = view;
  if (view === 'random') {
    state.randomUses++;
    saveState(state);
    checkAchievements();
  }
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
  renderTabs();
  renderContent();
}

// Search
document.getElementById('search').addEventListener('input', (e) => {
  searchQuery = e.target.value.trim();
  renderContent();
});

// Scroll to top button
window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').classList.toggle('show', window.scrollY > 400);
});

// Toast dismiss on tap
document.getElementById('toast').addEventListener('click', () => {
  document.getElementById('toast').classList.remove('show');
});

// ============================================================
// QUIZ ENGINE
// ============================================================
let quizState = { mode: null, questions: [], current: 0, score: 0, answered: false };

function getQuizzesByCat(cat) {
  if (cat === 'all') return [...QUIZZES];
  return QUIZZES.filter(q => DATA[q.dataIdx]?.cat === cat);
}

function startQuiz(cat, count) {
  const pool = getQuizzesByCat(cat);
  const shuffled = pool.sort(() => Math.random() - 0.5).slice(0, count);
  // Shuffle options for each question
  shuffled.forEach(q => {
    const correctText = q.opts[q.answer];
    const shuffledOpts = [...q.opts].sort(() => Math.random() - 0.5);
    q._opts = shuffledOpts;
    q._answer = shuffledOpts.indexOf(correctText);
  });
  quizState = { mode: cat, questions: shuffled, current: 0, score: 0, answered: false };
  renderQuiz();
}

function renderQuizModeSelect() {
  const contentEl = document.getElementById('content');
  const total = QUIZZES.length;

  let html = `<div style="text-align:center;padding:20px 0 10px">
    <div style="font-size:48px;margin-bottom:8px">🧠</div>
    <div style="font-size:20px;font-weight:700">퀴즈 모드</div>
    <div style="font-size:13px;color:var(--text2);margin-top:4px">총 ${total}문제 | 정답 +15 XP</div>
  </div>`;

  // Best scores
  const hasBest = Object.keys(state.quizBest).length > 0;
  if (hasBest) {
    html += `<div style="margin:0 16px 16px;padding:12px;background:var(--surface);border-radius:10px;border:1px solid var(--border)">
      <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px">최고 기록</div>`;
    Object.entries(state.quizBest).forEach(([key, val]) => {
      const label = key === 'all' ? '전체' : (CATS[key]?.name || key);
      html += `<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px">
        <span>${label}</span><span style="color:var(--green);font-weight:700">${val.score}/${val.total} (${Math.round(val.score/val.total*100)}%)</span>
      </div>`;
    });
    html += `</div>`;
  }

  html += `<div class="quiz-mode-select">`;

  // Full quiz
  html += `<div class="quiz-mode-btn" onclick="startQuiz('all', 10)">
    <div class="quiz-mode-title">🎯 종합 퀴즈 (10문제)</div>
    <div class="quiz-mode-desc">전체 카테고리에서 랜덤 10문제</div>
  </div>`;

  // Quick quiz
  html += `<div class="quiz-mode-btn" onclick="startQuiz('all', 5)">
    <div class="quiz-mode-title">⚡ 빠른 퀴즈 (5문제)</div>
    <div class="quiz-mode-desc">짧게 5문제만</div>
  </div>`;

  // By category
  Object.entries(CATS).forEach(([key, cat]) => {
    const count = getQuizzesByCat(key).length;
    if (count > 0) {
      html += `<div class="quiz-mode-btn" onclick="startQuiz('${key}', ${Math.min(count, 10)})">
        <div class="quiz-mode-title">${cat.icon} ${cat.name} (${Math.min(count, 10)}문제)</div>
        <div class="quiz-mode-desc">${count}문제 중 랜덤 출제</div>
      </div>`;
    }
  });

  html += `</div>`;
  contentEl.innerHTML = html;
}

function renderQuiz() {
  const contentEl = document.getElementById('content');
  const qs = quizState.questions;
  const ci = quizState.current;

  if (ci >= qs.length) {
    renderQuizResult();
    return;
  }

  const q = qs[ci];
  const concept = DATA[q.dataIdx];
  const pct = ((ci) / qs.length) * 100;

  let html = `<div class="quiz-container">
    <div class="quiz-header">
      <div class="quiz-progress">${ci + 1} / ${qs.length}</div>
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="quiz-question">${q.q}</div>
    <div class="quiz-hint">${CATS[concept.cat]?.icon || ''} ${concept.title}</div>
    <div class="quiz-options">`;

  q._opts.forEach((opt, i) => {
    html += `<button class="quiz-option" id="qopt-${i}" onclick="answerQuiz(${i})">${opt}</button>`;
  });

  html += `</div>
    <div id="quizExplain"></div>
    <div id="quizNext" style="display:none">
      <button class="quiz-next-btn" onclick="nextQuiz()">${ci + 1 < qs.length ? '다음 문제' : '결과 보기'}</button>
    </div>
  </div>`;

  contentEl.innerHTML = html;
}

function answerQuiz(selected) {
  if (quizState.answered) return;
  quizState.answered = true;

  const q = quizState.questions[quizState.current];
  const correct = q._answer;
  const isCorrect = selected === correct;

  if (isCorrect) {
    quizState.score++;
    addXP(15, '퀴즈 정답');
  }

  // Mark options
  document.querySelectorAll('.quiz-option').forEach((el, i) => {
    el.classList.add('disabled');
    if (i === correct) el.classList.add('correct');
    if (i === selected && !isCorrect) el.classList.add('wrong');
  });

  // Show explanation
  const concept = DATA[q.dataIdx];
  document.getElementById('quizExplain').innerHTML = `
    <div class="quiz-explain">
      <strong>${isCorrect ? '✅ 정답!' : '❌ 오답!'}</strong><br><br>
      ${concept.easy}
    </div>`;

  document.getElementById('quizNext').style.display = 'block';
  renderLevelBar();
}

function nextQuiz() {
  quizState.current++;
  quizState.answered = false;
  renderQuiz();
}

function renderQuizResult() {
  const contentEl = document.getElementById('content');
  const total = quizState.questions.length;
  const score = quizState.score;
  const pct = Math.round((score / total) * 100);

  let icon, msg;
  if (pct === 100) { icon = '🏆'; msg = '완벽합니다!'; }
  else if (pct >= 80) { icon = '🎉'; msg = '훌륭해요!'; }
  else if (pct >= 60) { icon = '👍'; msg = '좋아요!'; }
  else if (pct >= 40) { icon = '💪'; msg = '더 화이팅!'; }
  else { icon = '📚'; msg = '복습이 필요해요'; }

  // Save best score
  const key = quizState.mode;
  if (!state.quizBest[key] || score > state.quizBest[key].score) {
    state.quizBest[key] = { score, total };
  }
  state.quizCount++;
  if (pct === 100) state.quizPerfect++;
  saveState(state);
  checkAchievements();

  let html = `<div class="quiz-result">
    <div class="quiz-result-icon">${icon}</div>
    <div class="quiz-result-score">${pct}%</div>
    <div class="quiz-result-label">${msg}</div>
    <div class="quiz-result-detail">
      <div class="quiz-result-stat">
        <div class="num" style="color:var(--green)">${score}</div>
        <div class="label">정답</div>
      </div>
      <div class="quiz-result-stat">
        <div class="num" style="color:var(--red)">${total - score}</div>
        <div class="label">오답</div>
      </div>
      <div class="quiz-result-stat">
        <div class="num" style="color:var(--accent)">${total}</div>
        <div class="label">총 문제</div>
      </div>
    </div>
    <button class="quiz-next-btn" onclick="renderQuizModeSelect()" style="margin-bottom:10px">다시 풀기</button>
    <button class="quiz-next-btn" onclick="setView('all')" style="background:var(--surface);color:var(--text);border:1px solid var(--border)">노트로 돌아가기</button>
  </div>`;

  contentEl.innerHTML = html;
}

// ============================================================
// INIT
// ============================================================
renderLevelBar();
renderDailyGoal();
renderTabs();
renderContent();
checkAchievements();

// Fixed top 높이만큼 body padding 설정
(function adjustFixedTop() {
  const fixedTop = document.querySelector('.fixed-top');
  const h = fixedTop.offsetHeight;
  document.body.style.paddingTop = h + 'px';
  document.querySelectorAll('.category-header').forEach(el => {
    el.style.top = h + 'px';
  });
  new ResizeObserver(() => {
    const nh = fixedTop.offsetHeight;
    document.body.style.paddingTop = nh + 'px';
    document.querySelectorAll('.category-header').forEach(el => {
      el.style.top = nh + 'px';
    });
  }).observe(fixedTop);
})();

// PWA Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
